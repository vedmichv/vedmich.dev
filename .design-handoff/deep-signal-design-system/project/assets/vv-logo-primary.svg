<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Viktor Vedmich — Deep Signal logo">
  <title>Viktor Vedmich — Deep Signal</title>
  <defs>
    <linearGradient id="vv-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
    <mask id="vv-cut">
      <rect width="100" height="100" fill="white"/>
      <!-- Left V: upright triangle pointing down -->
      <path d="M22 26 L36 74 L44 74 L58 26 L50 26 L40 60 L30 26 Z" fill="black"/>
      <!-- Right V: slanted italic V -->
      <path d="M54 26 L66 74 L74 74 L78 26 L70 26 L68 60 L62 26 Z" fill="black"/>
    </mask>
  </defs>
  <rect width="100" height="100" rx="18" fill="#0F172A"/>
  <rect width="100" height="100" rx="18" fill="url(#vv-grad)" mask="url(#vv-cut)"/>
</svg>
