<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Viktor Vedmich — Deep Signal logo (inverse)">
  <title>Viktor Vedmich — Deep Signal (inverse for light backgrounds)</title>
  <defs>
    <mask id="vv-cut-inv">
      <rect width="100" height="100" fill="white"/>
      <!-- Left V: outer edges 14,26 -> 30,74 -> 46,26; inner triangle carved back -->
      <path d="M14 26 L22 26 L30 60 L38 26 L46 26 L34 74 L26 74 Z" fill="black"/>
      <!-- Right V: mirror of left, centred on x=70 -->
      <path d="M54 26 L62 26 L70 60 L78 26 L86 26 L74 74 L66 74 Z" fill="black"/>
    </mask>
  </defs>
  <!-- Background shows through where mask cuts: teal accent -->
  <rect width="100" height="100" rx="18" fill="#14B8A6"/>
  <rect width="100" height="100" rx="18" fill="#0F172A" mask="url(#vv-cut-inv)"/>
</svg>
