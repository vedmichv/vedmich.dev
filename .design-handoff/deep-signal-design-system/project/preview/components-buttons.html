<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Buttons</title><style>
.btnrow { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.btn { font-family: var(--font-body); font-size: 15px; font-weight: 500; padding: 10px 18px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: all 150ms ease-out; display: inline-flex; align-items: center; gap: 8px; }
.btn.primary { background: #14B8A6; color: #0F172A; }
.btn.accent { background: #F59E0B; color: #0F172A; }
.btn.ghost { background: transparent; color: #E2E8F0; border-color: #334155; }
.btn.link { background: transparent; color: #2DD4BF; padding-left: 0; padding-right: 0; }
.label { margin-bottom: 4px; }
</style></head><body>
<div class="card">
  <div>
    <div class="label">Default</div>
    <div class="btnrow">
      <button class="btn primary">Get in touch</button>
      <button class="btn accent">Read on Amazon</button>
      <button class="btn ghost">View all posts</button>
      <button class="btn link">Read more →</button>
    </div>
  </div>
  <div>
    <div class="label">Hover</div>
    <div class="btnrow">
      <button class="btn" style="background:#2DD4BF;color:#0F172A">Get in touch</button>
      <button class="btn" style="background:#FBBF24;color:#0F172A">Read on Amazon</button>
      <button class="btn ghost" style="border-color:#14B8A6;box-shadow:0 0 16px rgba(20,184,166,.15)">View all posts</button>
      <button class="btn" style="color:#FBBF24;background:transparent;padding-left:0;padding-right:0">Read more →</button>
    </div>
  </div>
  <div class="a11y-row">
    <span class="a11y-title">WCAG ·</span>
    <span class="a11y a11y-aaa"><span class="dot"></span>Primary fill <b>8.8:1</b> AAA</span>
    <span class="a11y a11y-aaa"><span class="dot"></span>Accent fill <b>11.2:1</b> AAA</span>
    <span class="a11y a11y-aaa"><span class="dot"></span>Ghost text <b>12.0:1</b> AAA</span>
    <span class="a11y a11y-aa"><span class="dot"></span>Link text <b>5.4:1</b> AA</span>
    <span class="a11y a11y-info"><span class="dot"></span>Focus ring 3px @ 20% opacity · visible ≥3:1</span>
  </div>
  <div class="mono" style="color:var(--text-muted)">Link swapped from #14B8A6 (3.9:1, fail small-text) to #2DD4BF (5.4:1). All fills use #0F172A text on brand bg — AAA across the board.</div>
</div>
</body></html>
