<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Radius</title><style>
.radii { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.rd { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.rd .box { width: 90%; height: 70px; background: var(--bg-surface); border: 1px solid var(--border); }
.rd .name { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text-primary); }
.rd .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style></head><body>
<div class="card">
  <div class="radii">
    <div class="rd"><div class="box" style="border-radius:4px"></div><div class="name">sm</div><div class="v">4px</div></div>
    <div class="rd"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="v">8px</div></div>
    <div class="rd"><div class="box" style="border-radius:12px"></div><div class="name">lg</div><div class="v">12px</div></div>
    <div class="rd"><div class="box" style="border-radius:16px"></div><div class="name">xl</div><div class="v">16px</div></div>
    <div class="rd"><div class="box" style="border-radius:9999px"></div><div class="name">full</div><div class="v">9999px</div></div>
  </div>
  <div class="a11y-row">
    <span class="a11y-title">A11y ·</span>
    <span class="a11y a11y-info"><span class="dot"></span>Visual only — no text contrast check</span>
    <span class="a11y a11y-aa"><span class="dot"></span>All borders ≥3:1 on surface · WCAG 1.4.11 pass</span>
  </div>
</div>
</body></html>
