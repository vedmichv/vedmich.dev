<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Inputs</title><style>
.stack { display: flex; flex-direction: column; gap: 14px; }
label.fld { display: flex; flex-direction: column; gap: 6px; }
label.fld .lb { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: #E2E8F0; }
input, textarea { font-family: var(--font-body); font-size: 15px; background: #0F172A; color: #E2E8F0; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; outline: none; transition: all 150ms ease-out; }
input:focus, textarea:focus { border-color: #14B8A6; box-shadow: 0 0 0 3px rgba(20,184,166,.2); }
input::placeholder, textarea::placeholder { color: #94A3B8; }
.hint { font-family: var(--font-body); font-size: 12px; color: #94A3B8; }
</style></head><body>
<div class="card">
  <div class="stack">
    <label class="fld">
      <span class="lb">Name</span>
      <input type="text" value="Viktor Vedmich">
    </label>
    <label class="fld">
      <span class="lb">Email (focused)</span>
      <input type="email" value="hi@vedmich.dev" style="border-color:#14B8A6;box-shadow:0 0 0 3px rgba(20,184,166,.2)">
    </label>
    <label class="fld">
      <span class="lb">Message</span>
      <textarea rows="2" placeholder="What should we build?"></textarea>
    </label>
  </div>
  <div class="a11y-row">
    <span class="a11y-title">WCAG ·</span>
    <span class="a11y a11y-aaa"><span class="dot"></span>Input value <b>14.5:1</b> AAA</span>
    <span class="a11y a11y-aa"><span class="dot"></span>Label text <b>12.0:1</b> AAA</span>
    <span class="a11y a11y-aa"><span class="dot"></span>Placeholder <b>6.4:1</b> AA</span>
    <span class="a11y a11y-aa"><span class="dot"></span>Border default <b>3.1:1</b> UI · AA</span>
    <span class="a11y a11y-aa"><span class="dot"></span>Focus ring <b>3.9:1</b> UI · AA</span>
  </div>
  <div class="mono" style="color:var(--text-muted)">Placeholder lightened from #78909C (3.7:1) to #94A3B8 (6.4:1) to meet WCAG 1.4.11 for non-text UI.</div>
</div>
</body></html>
